services:
  postgres:
    image: postgres:16-alpine
    container_name: marketing-dashboard-db
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing
      POSTGRES_DB: marketing_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketing -d marketing_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
